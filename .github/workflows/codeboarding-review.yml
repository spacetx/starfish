name: CodeBoarding review

on:
  pull_request:
    branches: [master]
    types: [opened, reopened, ready_for_review, synchronize, closed]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: codeboarding-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' }}

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: CodeBoarding/CodeBoarding-action@feat/depth-auto-detect
        with:
          mode: review
          llm_provider: openrouter
          llm_api_key: ${{ secrets.LLM_API_KEY }}
